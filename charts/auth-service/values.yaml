replicaCount: 1

image:
  repository: mock-trading-platform/auth-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

env:
  PORT: "8081"
  DEV_MODE: "true"
  TOKEN_EXPIRY: "1h"
  # JWT_SECRET은 여기에 실제 값을 넣지 않는다.
  # 빈 값은 렌더되지 않으며, 아래 envFrom(secretRef)으로 주입한다.
  JWT_SECRET: ""

# External Secrets(ESO)가 생성한 K8s Secret을 컨테이너 env로 주입하는 경로.
# 기본은 빈 목록(literal env만 사용). 환경 values에서 아래처럼 override 한다.
#   envFrom:
#     - secretRef:
#         name: auth-jwt
# env(JWT_SECRET: "")는 빈 값이라 렌더되지 않으므로 envFrom 값이 그대로 적용된다.
envFrom: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

probes:
  liveness:
    path: /health
    port: 8081
    initialDelaySeconds: 3
    periodSeconds: 10
  readiness:
    path: /ready
    port: 8081
    initialDelaySeconds: 3
    periodSeconds: 10
