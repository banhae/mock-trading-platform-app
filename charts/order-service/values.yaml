replicaCount: 1
# Runtime matcher는 프로세스 로컬 in-memory book 기준으로 동작하므로
# 가로 확장(>1 replica)을 지원하지 않는다.
# 이 값은 기본적으로 1로 유지해야 한다.

image:
  repository: mock-trading-platform/order-service
  tag: latest
  pullPolicy: IfNotPresent

deploymentStrategy:
  # 롤링업데이트 중 replica overlap 이 발생하면 각 pod의 book 이 분기될 수 있어
  # matcher runtime 모드에서는 Recreate 전략을 기본으로 사용한다.
  type: Recreate

service:
  type: ClusterIP
  port: 8080

env:
  PORT: "8080"
  DEV_MODE: "true"
  # DATABASE_URL과 JWT_SECRET은 여기에 실제 값을 넣지 않는다.
  # Secret 또는 외부 설정으로 주입할 것. (다음 phase에서 처리)
  DATABASE_URL: ""
  JWT_SECRET: ""
  # Phase 2 — event bus (NATS JetStream) publisher wiring.
  # EVENT_BUS_ENABLED=false 이면 no-op publisher 로 동작한다.
  # NATS 가 배포된 환경에서 true 로 override 할 것.
  EVENT_BUS_ENABLED: "false"
  NATS_URL: ""
  NATS_STREAM: "ORDERS"

# External Secrets(ESO)가 생성한 K8s Secret을 컨테이너 env로 주입하는 경로.
# 기본은 빈 목록(literal env만 사용). 환경 values에서 아래처럼 override 한다.
#   envFrom:
#     - secretRef:
#         name: auth-jwt
# env(JWT_SECRET: "")는 빈 값이라 렌더되지 않으므로 envFrom 값이 그대로 적용된다.
envFrom: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

probes:
  liveness:
    path: /health
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /ready
    port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

autoscaling:
  enabled: false
