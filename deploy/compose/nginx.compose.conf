# Local demo only.
# In production the K8s ALB Ingress (charts/mock-trading-platform-ingress) handles
# /api/* routing. For the docker-compose demo we replicate the routing
# inside nginx so the browser still calls same-origin (/api/...) — the
# same contract the SPA already uses.
#
# Each backend service registers BOTH bare (/login) and prefixed
# (/api/auth/login) paths in main.go, so we forward the path as-is.

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    return 200;
  }

  location /api/auth/ {
    proxy_pass http://auth-service:8081;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /api/orders {
    proxy_pass http://order-service:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /api/wallet/ {
    proxy_pass http://wallet-service:8082;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /api/market/ {
    proxy_pass http://marketdata-service:8083;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    try_files $uri /index.html;
  }
}
